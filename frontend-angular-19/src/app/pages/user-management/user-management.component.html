<div class="user-management">

    <div class="actions">
        <h2>User List</h2>
        <button mat-raised-button color="primary" (click)="openAddUserDialog()">
            Add User
        </button>
    </div>
    @if(users.length){
    <mat-card>
        <table mat-table [dataSource]="users" class="mat-elevation-z8">
            <ng-container matColumnDef="username">
                <th mat-header-cell *matHeaderCellDef> Username </th>
                <td mat-cell *matCellDef="let user"> {{ user.username }} </td>
            </ng-container>

            <ng-container matColumnDef="email">
                <th mat-header-cell *matHeaderCellDef> Email </th>
                <td mat-cell *matCellDef="let user"> {{ user.email }} </td>
            </ng-container>

            <ng-container matColumnDef="roles">
                <th mat-header-cell *matHeaderCellDef> Roles </th>
                <td mat-cell *matCellDef="let user">
                    <div *ngFor="let role of user.roles" style="width: 100%;">
                        @if(role.name != 'default-roles-user-api'){
                        <span>{{ role.name }}</span>
                        <button mat-icon-button color="warn" (click)="removeRole(user, role.name)">
                            <mat-icon>remove</mat-icon>
                        </button>
                        }
                    </div>
                    <button mat-icon-button color="primary" (click)="openAssignRoleDialog(user)">
                        <mat-icon>add</mat-icon>
                    </button>
                </td>
            </ng-container>


            <ng-container matColumnDef="emailVerified">
                <th mat-header-cell *matHeaderCellDef> Email Verified </th>
                <td mat-cell *matCellDef="let user"> {{ user.emailVerified }} </td>
            </ng-container>

            <ng-container matColumnDef="enabled">
                <th mat-header-cell *matHeaderCellDef> Enabled </th>
                <td mat-cell *matCellDef="let user">
                    <mat-slide-toggle [(ngModel)]="user.enabled"
                        (change)="onToggleChangeDisable(user)"></mat-slide-toggle>
                </td>
            </ng-container>

            <ng-container matColumnDef="actions">
                <th mat-header-cell *matHeaderCellDef> Actions </th>
                <td mat-cell *matCellDef="let user">
                    <button mat-icon-button color="accent" (click)="resetPassword(user.email)">
                        <mat-icon>vpn_key</mat-icon>
                    </button>
                    <button mat-icon-button color="warn" (click)="deleteUser(user.email)">
                        <mat-icon>delete</mat-icon>
                    </button>
                </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="['username', 'email','emailVerified','roles','enabled', 'actions']">
            </tr>
            <tr mat-row
                *matRowDef="let row; columns: ['username', 'email','emailVerified','roles','enabled', 'actions'];"></tr>
        </table>
    </mat-card>
    }

</div>
